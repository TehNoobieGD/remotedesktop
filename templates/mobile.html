<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Remote Control Mobile</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body class="mobile-page">
  <main class="container mobile-shell">
    <section id="join-section" class="card">
      <h1>Join PC Room</h1>
      <div class="row">
        <label for="room-code-input">Room Code</label>
        <input id="room-code-input" type="text" autocomplete="off" />
      </div>
      <div class="row">
        <label for="room-password-input">Password</label>
        <input id="room-password-input" type="password" />
      </div>
      <div class="row">
        <label for="device-name-input">Device Name</label>
        <input id="device-name-input" type="text" value="My Phone" />
      </div>
      <button id="join-btn">Join Room</button>
      <p class="muted">Mobile can join only. Room must be created on PC first.</p>
    </section>

    <section id="control-section" class="hidden">
      <section class="card">
        <h2>Connected</h2>
        <p><strong>PC:</strong> <span id="info-pc">-</span></p>
        <p><strong>Room:</strong> <span id="info-room">-</span></p>
        <p><strong>Agent:</strong> <span id="info-agent">offline</span></p>
      </section>

      <section class="card">
        <h2>Trackpad</h2>
        <div id="trackpad" class="trackpad">
          <span>Swipe here to move mouse</span>
        </div>
        <div class="mouse-buttons">
          <button data-mouse="left">Left Click</button>
          <button data-mouse="right">Right Click</button>
          <button data-mouse="middle">Middle Click</button>
        </div>
        <div class="mouse-buttons">
          <button data-scroll="-1">Scroll Up</button>
          <button data-scroll="1">Scroll Down</button>
        </div>
      </section>

      <section class="card">
        <h2>Keyboard</h2>
        <div class="keyboard-toolbar">
          <label for="layout-select">Layout</label>
          <select id="layout-select">
            <option value="qwerty">QWERTY</option>
            <option value="azerty">AZERTY</option>
          </select>
        </div>
        <div id="keyboard" class="keyboard"></div>
      </section>
    </section>

    <p id="status-line" class="status-line"></p>
  </main>
  <script src="/static/mobile.js"></script>
</body>
</html>
